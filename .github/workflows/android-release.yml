name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION:1}"
          fi
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_KEYSTORE | base64 --decode > keystore.jks

      - name: Build Release APK
        env:
          CLIPCAT_STORE_FILE: keystore.jks
          CLIPCAT_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CLIPCAT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CLIPCAT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build Release App Bundle (AAB)
        env:
          CLIPCAT_STORE_FILE: keystore.jks
          CLIPCAT_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CLIPCAT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CLIPCAT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipcat-android-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipcat-android-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab